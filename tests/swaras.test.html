<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swara Module Tests</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }

        h1 {
            color: #ff9800;
        }

        .test-result {
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
        }

        .pass {
            background: #1b5e20;
        }

        .fail {
            background: #b71c1c;
        }

        .summary {
            margin-top: 20px;
            padding: 15px;
            background: #333;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <h1>🎵 Swara Module Tests</h1>
    <div id="results"></div>
    <div id="summary" class="summary"></div>

    <script src="../js/music/swaras.js"></script>
    <script>
        const results = document.getElementById('results');
        const summary = document.getElementById('summary');
        let passed = 0;
        let failed = 0;

        function test(name, condition) {
            const div = document.createElement('div');
            div.className = `test-result ${condition ? 'pass' : 'fail'}`;
            div.textContent = `${condition ? '✓' : '✗'} ${name}`;
            results.appendChild(div);
            if (condition) passed++;
            else failed++;
        }

        // Test 1: Base frequency
        test('Default base frequency is 240Hz', SwaraModule.getBaseFrequency() === 240);

        // Test 2: Set base frequency
        SwaraModule.setBaseFrequency(256);
        test('Can set base frequency to 256Hz', SwaraModule.getBaseFrequency() === 256);
        SwaraModule.setBaseFrequency(240); // Reset

        // Test 3: Sa frequency
        test('Sa frequency equals base (240Hz)', SwaraModule.getFrequency('Sa') === 240);

        // Test 4: Pa frequency (ratio 1.5)
        const paFreq = SwaraModule.getFrequency('Pa');
        test('Pa frequency is 1.5x Sa (360Hz)', Math.abs(paFreq - 360) < 0.1);

        // Test 5: Swara detection
        const detected = SwaraModule.detectSwara(240);
        test('Detects 240Hz as Sa', detected && detected.shortName === 'Sa');

        // Test 6: Swara detection with tolerance
        const nearSa = SwaraModule.detectSwara(245, 50);
        test('Detects 245Hz as near Sa with 50 cent tolerance', nearSa && nearSa.isMatch);

        // Test 7: Main swaras list
        const mainSwaras = SwaraModule.getMainSwaras();
        test('Main swaras has 7 notes', mainSwaras.length === 7);
        test('Main swaras starts with Sa', mainSwaras[0] === 'Sa');

        // Test 8: All swaras list
        const allSwaras = SwaraModule.getAllSwaras();
        test('All swaras has 12 notes', allSwaras.length === 12);

        // Test 9: Accuracy calculation
        const accuracy = SwaraModule.getAccuracy(250, 'Sa');
        test('Accuracy status is "high" for 250Hz vs Sa', accuracy.status === 'high');

        const correctAccuracy = SwaraModule.getAccuracy(240, 'Sa');
        test('Accuracy status is "correct" for exact match', correctAccuracy.status === 'correct');

        // Test 10: Komal/Tivra frequencies
        const reKomal = SwaraModule.getFrequency('Re_komal');
        const reShuddha = SwaraModule.getFrequency('Re');
        test('Re komal < Re shuddha', reKomal < reShuddha);

        const maShuddha = SwaraModule.getFrequency('Ma');
        const maTivra = SwaraModule.getFrequency('Ma_tivra');
        test('Ma tivra > Ma shuddha', maTivra > maShuddha);

        // Summary
        summary.innerHTML = `
            <strong>Test Results:</strong> ${passed} passed, ${failed} failed<br>
            <strong>Success Rate:</strong> ${((passed / (passed + failed)) * 100).toFixed(1)}%
        `;
    </script>
</body>

</html>
